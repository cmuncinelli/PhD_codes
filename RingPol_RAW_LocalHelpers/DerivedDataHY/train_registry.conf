# train_registry.conf
#
# Manual registry of Hyperloop train runs for the RingPol derived-data analysis.
#
# Each line registers one train run. Fields are whitespace-separated.
# Lines beginning with '#' are ignored.
#
# Columns:
#   TRAIN_RUN_ID    : Hyperloop train run number (from the HY interface)
#   DATASET_NAME    : Human-readable dataset label, used as parent folder name.
#                     Should match the raw-data pass naming convention.
#   WAGON_SHORTNAME : Short label for the wagon configuration, used as the
#                     child folder name. Keep it concise but unambiguous.
#   STORAGE_BASE    : Absolute path to the root of all RingPol data on this
#                     machine (no trailing slash).
#
# Resulting directory structure for each entry:
#
#   <STORAGE_BASE>/<DATASET_NAME>/<WAGON_SHORTNAME>/
#     aod_collections/          <- place MonALISA XML files here manually
#     DownloadListFromAlien.txt  <- generated automatically
#     input_data_storage.txt     <- generated automatically
#     AO2Ds/                     <- AO2D_*.root files downloaded here
#     results_consumer/          <- written by the O2 derived-data consumer
#
# Example path for the first entry below:
#   /home/users/cicerodm/RingPol/LHC25ae_pass2/ITSandTPC_min3ITS/AO2Ds/AO2D_1.root
#
# ---- LHC25ae_pass2 (1 derived dataset) ------------------------------------
#
# TRAIN_RUN_ID  DATASET_NAME          WAGON_SHORTNAME      STORAGE_BASE
